<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Volunteer Rewards Store — redeem your rescue credits for premium lifestyle rewards.">
    <title>Rewards Store — SOS Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="store.css">
    <!-- Three.js for 3D background -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
</head>

<body>

    <!-- ─── 3D Background Canvas ─────────────────── -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="grid-overlay" aria-hidden="true"></div>

    <!-- ─── Header ─────────────────────────────────── -->
    <header class="store-header" id="store-header">
        <div class="header-credits" id="header-credits">
            <svg class="credits-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v12M8 10l4-4 4 4M8 14l4 4 4-4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="credits-label">Credits</span>
            <span class="credits-value" id="credits-value">2,450</span>
        </div>

        <div class="header-right">
            <a href="index.html" class="header-back" title="Back to Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M3 12h18M3 12l6-6M3 12l6 6" />
                </svg>
            </a>
            <button class="cart-toggle" id="cart-toggle" type="button" aria-label="Open cart">
                <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 01-8 0" />
                </svg>
                Cart
                <span class="cart-badge" id="cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- ─── Hero ─────────────────────────────────────── -->
    <section class="store-hero">
        <div class="store-hero__tag">
            <span></span>
            LIVE REWARDS STORE
        </div>
        <h1 class="store-hero__title">
            Turn your rescues<br>into <em>premium rewards</em>
        </h1>
        <p class="store-hero__subtitle">
            Every walk you complete earns credits. Redeem them for
            curated lifestyle gear at unbeatable prices.
        </p>
        <div class="store-hero__stats">
            <div class="hero-stat">
                <div class="hero-stat__number">10+</div>
                <div class="hero-stat__label">Reward items</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat__number">Up to 60%</div>
                <div class="hero-stat__label">Credit savings</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat__number" id="hero-credits">2,450</div>
                <div class="hero-stat__label">Your credits</div>
            </div>
        </div>
    </section>

    <!-- ─── Category Filter ───────────────────────── -->
    <div class="store-filters" id="store-filters">
        <button class="filter-pill active" data-filter="all" type="button">All</button>
        <button class="filter-pill" data-filter="Tech" type="button">Tech</button>
        <button class="filter-pill" data-filter="Apparel" type="button">Apparel</button>
        <button class="filter-pill" data-filter="Audio" type="button">Audio</button>
        <button class="filter-pill" data-filter="Lifestyle" type="button">Lifestyle</button>
    </div>

    <!-- ─── Section label ─────────────────────────── -->
    <div class="section-label">
        <span class="section-label__text">Featured Rewards</span>
        <div class="section-label__line"></div>
    </div>

    <!-- ─── Product Grid (zigzag) ─────────────────── -->
    <main class="store-main">
        <div class="product-grid" id="product-grid">
            <!-- Cards rendered by JS -->
        </div>
    </main>

    <!-- ─── Cart Drawer ────────────────────────────── -->
    <div class="cart-backdrop" id="cart-backdrop"></div>
    <aside class="cart-drawer is-empty" id="cart-drawer" aria-label="Shopping cart">
        <div class="cart-drawer__header">
            <h2 class="cart-drawer__title">Your Cart</h2>
            <button class="cart-drawer__close" id="cart-close" type="button" aria-label="Close cart">✕</button>
        </div>
        <div class="cart-drawer__items" id="cart-items"></div>
        <div class="cart-drawer__footer" id="cart-footer">
            <div class="cart-drawer__total">
                <span>Total</span>
                <span class="cart-drawer__total-value" id="cart-total">₹0</span>
            </div>
            <button class="btn-checkout" id="btn-checkout" type="button">Redeem &amp; Checkout →</button>
        </div>
        <div class="cart-drawer__empty" id="cart-empty">
            <span class="cart-drawer__empty-icon">🛒</span>
            <p>Your cart is empty</p>
        </div>
    </aside>

    <script src="bg.js"></script>
    <script src="store.js"></script>
</body>

</html>
