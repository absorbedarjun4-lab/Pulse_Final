<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PULSE · Lost in the Field</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/cursor.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #192A56;
            --navy-deep: #0f1c3a;
            --champagne: #F7D794;
            --rose: #EDA6A3;
            --pearl: #FCFBFB;
            --pearl-dim: #d8d6d6;
        }

        html,
        body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            color: var(--pearl);
            overflow: hidden;
        }

        /* ── Background ─────────────────────────────── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 15%, #243d78 0%, transparent 55%),
                radial-gradient(ellipse 70% 55% at 80% 85%, #162244 0%, transparent 50%),
                radial-gradient(ellipse 100% 80% at 50% 50%, #192A56 20%, #0f1c3a 100%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(247, 215, 148, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(247, 215, 148, 0.04) 1px, transparent 1px);
            background-size: 44px 44px;
            animation: drift 70s linear infinite;
        }

        @keyframes drift {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 44px 44px;
            }
        }

        /* ── Layout ──────────────────────────────────── */
        .page {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            gap: 0;
        }

        /* ── Animated hole illustration ─────────────── */
        .hole-wrap {
            position: relative;
            width: 160px;
            height: 80px;
            margin-bottom: 2rem;
            animation: holeReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes holeReveal {
            from {
                opacity: 0;
                transform: scale(0.6);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .hole {
            width: 160px;
            height: 60px;
            background: radial-gradient(ellipse 100% 100% at 50% 60%, #05090f 60%, transparent 100%);
            border-radius: 50%;
            border: 2px solid rgba(247, 215, 148, 0.15);
            box-shadow: 0 0 40px rgba(10, 15, 30, 0.9), inset 0 8px 24px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* Stick figure falling into hole */
        .faller {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: fall 2.2s cubic-bezier(0.3, 0, 0.7, 1) 0.5s both;
        }

        @keyframes fall {
            0% {
                transform: translateX(-50%) translateY(-60px) rotate(-10deg) scale(1);
                opacity: 1;
            }

            60% {
                opacity: 1;
            }

            100% {
                transform: translateX(-50%) translateY(20px) rotate(25deg) scale(0.3);
                opacity: 0;
            }
        }

        .faller svg {
            width: 36px;
            height: 54px;
        }

        /* ── 404 number ──────────────────────────────── */
        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(5rem, 14vw, 8rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.08em;
            color: transparent;
            background: linear-gradient(135deg, var(--champagne) 30%, rgba(247, 215, 148, 0.3) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: fadeUp 0.7s 0.3s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Message ─────────────────────────────────── */
        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.3rem, 3.5vw, 1.9rem);
            font-weight: 600;
            color: var(--pearl);
            margin-bottom: 0.85rem;
            animation: fadeUp 0.7s 0.4s both;
            max-width: 520px;
        }

        .subtitle {
            font-size: 0.88rem;
            font-weight: 300;
            line-height: 1.7;
            color: var(--pearl-dim);
            opacity: 0.65;
            max-width: 400px;
            margin-bottom: 2.25rem;
            animation: fadeUp 0.7s 0.5s both;
        }

        /* ── Countdown signal ───────────────────────────── */
        .countdown-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            animation: fadeUp 0.7s 0.55s both;
            background: rgba(247, 215, 148, 0.03);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(247, 215, 148, 0.08);
        }

        .countdown-ring {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .countdown-number {
            position: absolute;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--champagne);
        }

        .countdown-label {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .help-text {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--rose);
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .redirect-text {
            font-size: 0.8rem;
            color: var(--pearl-dim);
            opacity: 0.8;
        }

        .redirect-text strong {
            color: var(--champagne);
        }

        /* ── CTA ─────────────────────────────────────── */
        .cta-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.7s 0.65s both;
        }

        .btn-home {
            padding: 0.75rem 1.75rem;
            background: linear-gradient(135deg, var(--champagne) 0%, #d4b975 100%);
            border: none;
            border-radius: 6px;
            color: var(--navy-deep, #0f1c3a);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }

        .btn-home:hover {
            box-shadow: 0 0 20px rgba(247, 215, 148, 0.35), 0 4px 14px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .btn-back {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid rgba(247, 215, 148, 0.2);
            border-radius: 6px;
            color: var(--pearl-dim);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: border-color 0.25s, color 0.25s;
        }

        .btn-back:hover {
            border-color: rgba(247, 215, 144, 0.45);
            color: var(--champagne);
        }

        /* ── Footer ──────────────────────────────────── */
        .foot {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.62rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--pearl-dim);
            opacity: 0.25;
        }
    </style>
</head>

<body>
    <div class="bg" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <div class="page" role="main">

        <!-- Hole + falling person -->
        <div class="hole-wrap" aria-hidden="true">
            <div class="faller">
                <!-- Stick figure SVG -->
                <svg viewBox="0 0 36 54" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="8" r="6" fill="rgba(237,166,163,0.85)" />
                    <line x1="18" y1="14" x2="18" y2="36" stroke="rgba(252,251,251,0.7)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <line x1="6" y1="22" x2="30" y2="22" stroke="rgba(252,251,251,0.7)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <line x1="18" y1="36" x2="8" y2="52" stroke="rgba(252,251,251,0.7)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <line x1="18" y1="36" x2="28" y2="52" stroke="rgba(252,251,251,0.7)" stroke-width="2.5"
                        stroke-linecap="round" />
                </svg>
            </div>
            <div class="hole"></div>
        </div>

        <!-- 404 -->
        <div class="error-code" aria-label="Error 404">404</div>

        <!-- Message -->
        <h1 class="title">Oops — looks like you fell into a hole.</h1>
        <p class="subtitle">
            Don't worry, we're sending help to rescue you.<br />
            The page you're looking for doesn't exist or has moved.
        </p>

        <!-- Countdown + Help incoming -->
        <div class="countdown-wrap" aria-live="polite">
            <div class="countdown-ring" aria-hidden="true">
                <svg viewBox="0 0 60 60" width="60" height="60">
                    <circle cx="30" cy="30" r="26" fill="none" stroke="rgba(247,215,148,0.1)" stroke-width="3" />
                    <circle cx="30" cy="30" r="26" fill="none" stroke="#F7D794" stroke-width="3" stroke-linecap="round"
                        stroke-dasharray="163.4" stroke-dashoffset="0" id="ring-progress"
                        style="transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: center;" />
                </svg>
                <span class="countdown-number" id="countdown-num">5</span>
            </div>
            <div class="countdown-label">
                <span class="help-text">Help incoming</span>
                <span class="redirect-text">Redirecting to home in <strong id="countdown-sec">5</strong>s</span>
            </div>
        </div>

        <!-- CTAs -->
        <div class="cta-group">
            <a href="/" class="btn-home" id="btn-go-home">← Back to Safety Now</a>
            <a href="javascript:history.back()" class="btn-back" id="btn-go-back">Go Back</a>
        </div>

    </div>

    <footer class="foot" role="contentinfo">PULSE · Crisis Management Platform · All activity logged</footer>

    <script>
        (function () {
            const SECONDS = 5;
            const ring = document.getElementById('ring-progress');
            const numEl = document.getElementById('countdown-num');
            const secEl = document.getElementById('countdown-sec');
            const CIRC = 163.4; // 2 * π * 26

            let remaining = SECONDS;

            // Set initial state
            ring.style.strokeDashoffset = '0';

            const tick = setInterval(() => {
                remaining--;
                numEl.textContent = remaining;
                secEl.textContent = remaining;

                // Shrink the ring proportionally
                const offset = CIRC * (1 - remaining / SECONDS);
                ring.style.strokeDashoffset = offset;

                if (remaining <= 0) {
                    clearInterval(tick);
                    window.location.href = '/';
                }
            }, 1000);
        })();
    </script>
    <script src="/js/cursor.js"></script>

</body>

</html>
